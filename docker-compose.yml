version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrichain-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      # Replace these with your actual values for Polygon testnet:
      - POLYGON_RPC_URL=https://rpc-amoy.polygon.technology
      - CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
      - PRIVATE_KEY=demo_key_replace_me
      - OWNER_PRIVATE_KEY=
      - FARMER_PRIVATE_KEY=
      - DISTRIBUTOR_PRIVATE_KEY=
      - RETAILER_PRIVATE_KEY=
      - CONSUMER_PRIVATE_KEY=
      - REQUIRE_BLOCKCHAIN=false
      - AFTERSHIP_API_KEY=
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrichain-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=/api
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - HOST=0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: agrichain-network
